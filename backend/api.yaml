openapi: 3.0.3
info:
  title: VRATA Backend API
  version: 1.1.0
  description: |
    API for user authorization, room lifecycle management, and integration contracts.
servers:
  - url: http://localhost:8080
    description: Local backend server

paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register user by username and password
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created and authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login user by username and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/rooms:
    post:
      tags: [Rooms]
      summary: Create a chat room and auto-join creator
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/rooms/join:
    post:
      tags: [Rooms]
      summary: Join an existing room by invite code
      operationId: joinRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Room joined successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Room not found by invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/rooms/leave:
    post:
      tags: [Rooms]
      summary: Leave current room by user id
      operationId: leaveRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveRoomRequest'
      responses:
        '200':
          description: Leave processed successfully (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRoomResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/messages:
    post:
      tags: [Messages]
      summary: Send message to room
      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '202':
          description: Message accepted for asynchronous delivery
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/rooms/{roomId}/messages:
    get:
      tags: [Messages]
      summary: Get delivered messages for user in room
      operationId: getRoomMessages
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Messages fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: rolan
        password:
          type: string
          minLength: 8
          maxLength: 128
          example: StrongPassword123

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: rolan
        password:
          type: string
          minLength: 8
          maxLength: 128
          example: StrongPassword123

    AuthResponse:
      type: object
      required: [userId, username, tokenType, accessToken, expiresAt]
      properties:
        userId:
          type: integer
          format: int64
          example: 42
        username:
          type: string
          example: rolan
        tokenType:
          type: string
          example: Bearer
        accessToken:
          type: string
          example: 7c6be87d-f326-4f57-8c35-5982c20f2f17
        expiresAt:
          type: string
          format: date-time
          example: 2026-04-10T20:00:00Z

    ErrorResponse:
      type: object
      required: [code, message, timestamp]
      properties:
        code:
          type: string
          example: INVALID_CREDENTIALS
        message:
          type: string
          example: Invalid username or password
        timestamp:
          type: string
          format: date-time
          example: 2026-04-10T08:14:00Z

    CreateRoomRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer
          format: int64
          minimum: 1
          example: 42
        name:
          type: string
          maxLength: 100
          nullable: true
          description: Optional room name. If omitted or blank, server generates `room-{id}`.
          example: Team lounge

    JoinRoomRequest:
      type: object
      required: [userId, inviteCode]
      properties:
        userId:
          type: integer
          format: int64
          minimum: 1
          example: 42
        inviteCode:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^[A-Za-z]{6}$'
          description: 6-letter Latin invite code, case-insensitive in requests.
          example: AbCdEf

    LeaveRoomRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer
          format: int64
          minimum: 1
          example: 42

    RoomResponse:
      type: object
      required: [id, name, inviteCode]
      properties:
        id:
          type: integer
          format: int64
          example: 7
        name:
          type: string
          example: Team lounge
        inviteCode:
          type: string
          pattern: '^[a-z]{6}$'
          example: kztmqa

    LeaveRoomResponse:
      type: object
      required: [roomDeleted]
      properties:
        leftRoomId:
          type: integer
          format: int64
          nullable: true
          description: Room id from which user was removed. Null when user was not in any room.
          example: 7
        roomDeleted:
          type: boolean
          description: True when room was deleted automatically because it became empty.
          example: false

    SendMessageRequest:
      type: object
      required: [roomId, userId, username, content]
      properties:
        roomId:
          type: integer
          format: int64
          minimum: 1
          example: 7
        userId:
          type: integer
          format: int64
          minimum: 1
          example: 42
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: rolan
        content:
          type: string
          minLength: 1
          maxLength: 2000
          example: Hello team

    MessageResponse:
      type: object
      required: [id, roomId, userId, username, content]
      properties:
        id:
          type: string
          example: 6eaf8f46-8f17-4d24-9ec4-84768f6ab9cc
        roomId:
          type: integer
          format: int64
          example: 7
        userId:
          type: integer
          format: int64
          example: 42
        username:
          type: string
          example: rolan
        content:
          type: string
          example: Hello team

    AuthEvent:
      type: object
      description: Contract payload for Kafka producer/consumer teams.
      required: [eventType, userId, username, occurredAt]
      properties:
        eventType:
          type: string
          enum: [USER_REGISTERED, USER_LOGGED_IN]
        userId:
          type: integer
          format: int64
        username:
          type: string
        occurredAt:
          type: string
          format: date-time

x-kafka-integration:
  authEvents:
    topic: auth.events.v1
    producer:
      owner: backend-auth-service
      responsibility: publish USER_REGISTERED and USER_LOGGED_IN events
    consumer:
      owner: chat-consumer-service
      responsibility: subscribe and react to AuthEvent payload
    payloadSchema: '#/components/schemas/AuthEvent'

x-websocket-integration:
  liveMessages:
    summary: Live room messages for frontend clients.
    protocol: STOMP over SockJS
    endpoint: /ws
    brokerPrefix: /topic
    connection:
      url: http://localhost:8080/ws
      clientFlow:
        - Connect to /ws using SockJS.
        - Create a STOMP client over that SockJS connection.
        - Subscribe to /topic/rooms/{roomId}/messages after STOMP connect.
        - Keep sending messages with POST /api/v1/messages.
    subscriptions:
      roomMessages:
        destinationTemplate: /topic/rooms/{roomId}/messages
        destinationExample: /topic/rooms/7/messages
        payloadSchema: '#/components/schemas/MessageResponse'
        payloadExample:
          id: 6eaf8f46-8f17-4d24-9ec4-84768f6ab9cc
          roomId: 7
          userId: 42
          username: rolan
          content: Hello team
    flow:
      history: Load existing room messages with GET /api/v1/rooms/{roomId}/messages?userId={userId}.
      send: Send messages with POST /api/v1/messages.
      live: Subscribe to the room topic to receive new messages after Kafka delivery.
    notes:
      - The WebSocket contract is receive-only in this version.
      - The backend publishes one live event after Kafka delivery succeeds for room members.
      - No extra WebSocket authentication is enforced yet; it follows the current REST auth model.
