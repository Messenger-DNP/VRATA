spring:
  application:
    name: chat-backend

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: chat-backend-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ru.vrata.backend.infrastructure.kafka"
        spring.json.value.default.type: ru.vrata.backend.infrastructure.kafka.KafkaMessage

  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://localhost:27017/chatdb}
